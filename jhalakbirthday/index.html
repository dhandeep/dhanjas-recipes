<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jhalak's First Birthday</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
            background-color: #f9f9f9;
        }
        header {
            background-color: #ffcccb;
            padding: 20px;
            color: #333;
        }
        header h1 {
            margin: 0;
            font-size: 2.5rem;
        }
        .content {
            padding: 20px;
        }
        .photo {
            margin: 20px 0;
        }
        .photo img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
        }
        .details {
            font-size: 1.2rem;
            margin: 20px 0;
        }
        .rsvp-form {
            margin: 20px auto;
            max-width: 400px;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            background-color: #fff;
        }
        .rsvp-form label {
            display: block;
            margin: 10px 0 5px;
            text-align: left;
        }
        .rsvp-form input, .rsvp-form button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            font-size: 1rem;
        }
        .rsvp-form button {
            background-color: #ff6f61;
            color: white;
            border: none;
            cursor: pointer;
        }
        .rsvp-form button:hover {
            background-color: #e65a50;
        }
    </style>
</head>
<body>
    <header>
        <h1>Jhalak's First Birthday</h1>
    </header>
    <div class="content">
        <div class="photo">
            <img src="placeholder-photo.jpg" alt="Jhalak's Photo">
            <!-- Replace 'placeholder-photo.jpg' with the actual photo path -->
        </div>
        <div class="details">
            <p><strong>Location:</strong> [Add location here]</p>
            <p><strong>Date:</strong> [Add date here]</p>
        </div>
        <div class="rsvp-form">
            <h2>RSVP Form</h2>
            <form id="rsvpForm">
                <label for="name">Your Name:</label>
                <input type="text" id="name" name="name" placeholder="Enter your name" required>
                
                <label for="email">Your Email:</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
                
                <label for="attendees">Number of Attendees:</label>
                <input type="number" id="attendees" name="attendees" placeholder="Enter number of attendees" required>
                
                <button type="submit">Submit RSVP</button>
            </form>
        </div>
    </div>
    <script>
        // JavaScript for handling form submission
        document.getElementById('rsvpForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                attendees: document.getElementById('attendees').value
            };

            // Replace 'API_ENDPOINT' with your actual API Gateway endpoint
            const apiEndpoint = 'https://API_ENDPOINT/rsvp';
            
            try {
                const response = await fetch(apiEndpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                if (response.ok) {
                    alert('RSVP submitted successfully!');
                } else {
                    alert('Failed to submit RSVP. Please try again.');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error submitting RSVP. Please try again.');
            }
        });
    </script>
</body>
</html>
